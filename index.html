<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Parlor omnivore — Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink: #FF2E8B;
  --pink-light: #FF6BB5;
  --pink-dim: #C4006A;
  --pink-bg: #FFF0F7;
  --white: #FFFFFF;
  --off-white: #FFF8FC;
  --text: #1A0010;
  --text-muted: #8C4D72;
  --border: rgba(255,46,139,0.15);
  --surface: #FFFFFF;
  --surface2: #FFF5FA;
}
html, body { height: 100%; background: var(--off-white); color: var(--text); font-family: 'DM Sans','Noto Sans JP',sans-serif; font-weight:300; overflow:hidden; }
#app { display:grid; grid-template-columns:260px 1fr; height:100vh; }

/* SIDEBAR */
#sidebar { background:var(--pink); display:flex; flex-direction:column; overflow:hidden; position:relative; }
#sidebar::before { content:''; position:absolute; top:-60px; left:-60px; width:260px; height:260px; border:2px solid rgba(255,255,255,0.2); border-radius:50%; pointer-events:none; }
#logo { padding:36px 28px 28px; border-bottom:1px solid rgba(255,255,255,0.2); position:relative; z-index:1; }
#logo .brand { font-size:22px; font-weight:400; color:#fff; line-height:1.2; letter-spacing:-0.01em; }
#logo .brand span { font-weight:300; font-style:italic; }
#logo .sub { margin-top:6px; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.55); }
#genre-label { padding:20px 28px 10px; font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:rgba(255,255,255,0.45); }
#genre-list { flex:1; overflow-y:auto; padding:0 14px 24px; scrollbar-width:none; }
#genre-list::-webkit-scrollbar { display:none; }

.genre-btn { display:flex; align-items:center; gap:10px; width:100%; padding:11px 14px; background:none; border:none; border-radius:8px; cursor:pointer; text-align:left; color:rgba(255,255,255,0.65); font-family:'DM Sans','Noto Sans JP',sans-serif; font-weight:300; font-size:13.5px; letter-spacing:0.02em; transition:all 0.18s; }
.genre-btn:hover { color:#fff; background:rgba(255,255,255,0.1); }
.genre-btn.active { color:var(--pink); background:#fff; font-weight:500; }
.genre-icon { font-size:16px; flex-shrink:0; }
.genre-count { margin-left:auto; font-size:11px; opacity:0.5; }
.genre-btn.active .genre-count { opacity:0.4; }

/* サブカテゴリ */
.sub-list { overflow:hidden; max-height:0; transition:max-height 0.3s ease; }
.sub-list.open { max-height:300px; }
.sub-btn { display:flex; align-items:center; gap:8px; width:100%; padding:9px 14px 9px 36px; background:none; border:none; border-radius:8px; cursor:pointer; text-align:left; color:rgba(255,255,255,0.5); font-family:'DM Sans','Noto Sans JP',sans-serif; font-weight:300; font-size:12.5px; transition:all 0.18s; }
.sub-btn:hover { color:#fff; background:rgba(255,255,255,0.08); }
.sub-btn.active { color:var(--pink); background:#fff; font-weight:500; }
.sub-count { margin-left:auto; font-size:10px; opacity:0.5; }

/* MAIN */
#main { display:flex; flex-direction:column; overflow:hidden; background:var(--off-white); }
#header { padding:32px 44px 24px; border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:flex-end; gap:16px; }
#genre-title { font-size:32px; font-weight:400; color:var(--pink); letter-spacing:-0.02em; line-height:1; }
#genre-desc { font-size:12px; color:var(--text-muted); letter-spacing:0.08em; padding-bottom:4px; }

/* GRID */
#drink-grid { flex:1; overflow-y:auto; padding:28px 44px; display:grid; grid-template-columns:repeat(auto-fill,minmax(185px,1fr)); gap:14px; align-content:start; scrollbar-width:thin; scrollbar-color:var(--pink-light) transparent; }
.drink-card { background:#fff; border:1.5px solid var(--border); border-radius:12px; cursor:pointer; overflow:hidden; transition:all 0.2s; animation:fadeUp 0.35s ease both; }
@keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.drink-card:hover { border-color:var(--pink-light); transform:translateY(-3px); box-shadow:0 8px 28px rgba(255,46,139,0.12); }

.drink-img-wrap { width:100%; aspect-ratio:3/4; overflow:hidden; background:var(--pink-bg); }
.drink-img-wrap img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; transition:transform 0.2s; }
.drink-card:hover .drink-img-wrap img { transform:scale(1.04); }
.drink-emoji-wrap { width:100%; aspect-ratio:auto; max-height:280px; background:var(--pink-bg); display:flex; align-items:center; justify-content:center; font-size:44px; transition:transform 0.2s; }
.drink-card:hover .drink-emoji-wrap { transform:scale(1.04); }

.drink-info { padding:14px 16px 16px; }
.drink-name { font-size:12.5px; font-weight:400; color:var(--text); line-height:1.5; margin-bottom:8px; }
.drink-price { font-size:19px; font-weight:500; color:var(--pink); letter-spacing:-0.01em; }
.drink-price span { font-size:11px; color:var(--text-muted); font-weight:300; margin-left:2px; }

/* MODAL */
#modal-overlay { position:fixed; inset:0; background:rgba(255,46,139,0.08); backdrop-filter:blur(8px); z-index:50; display:none; align-items:center; justify-content:center; padding:40px; }
#modal-overlay.open { display:flex; }
#modal { background:#fff; border:1.5px solid var(--border); border-radius:16px; max-width:480px; width:100%; max-height:80vh; overflow-y:auto; animation:modalIn 0.28s ease; scrollbar-width:none; position:relative; }
@keyframes modalIn { from{opacity:0;transform:scale(0.95) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
#modal-img-wrap { width:100%; aspect-ratio:1/1; overflow:hidden; border-radius:14px 14px 0 0; background:var(--pink-bg); display:flex; align-items:center; justify-content:center; }
#modal-img-wrap img { width:100%; height:100%; object-fit:contain; }
#modal-img-wrap .modal-emoji { font-size:80px; opacity:0.6; }
#modal-body { padding:28px 32px 32px; }
#modal-genre-tag { font-size:10px; letter-spacing:0.3em; text-transform:uppercase; color:var(--pink-light); margin-bottom:8px; }
#modal-name { font-size:24px; font-weight:400; color:var(--text); margin-bottom:16px; line-height:1.3; }
#modal-desc { font-size:13.5px; color:var(--text-muted); line-height:1.9; margin-bottom:24px; padding-left:14px; border-left:2px solid var(--pink-light); }
#modal-price { font-size:30px; font-weight:500; color:var(--pink); letter-spacing:-0.02em; }
#modal-price span { font-size:13px; color:var(--text-muted); font-weight:300; }
#modal-close { position:absolute; top:16px; right:16px; background:rgba(255,46,139,0.08); border:none; color:var(--pink); width:32px; height:32px; border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.18s; z-index:10; }
#modal-close:hover { background:var(--pink); color:#fff; }









@media (max-width: 768px) {
  html, body { overflow: hidden; }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* Sidebar as horizontal tab bar */
  #sidebar { width: 100%; height: auto; flex-direction: column; flex-shrink: 0; }
  #logo { padding: 16px 20px 12px; }
  #logo .brand { font-size: 17px; }
  #logo .sub { font-size: 10px; }
  #genre-label { display: none; }
  #genre-list {
    display: flex; flex-direction: row;
    overflow-x: auto; overflow-y: hidden;
    padding: 0 8px 10px; gap: 4px; scrollbar-width: none;
    flex-shrink: 0;
  }
  #genre-list::-webkit-scrollbar { display: none; }
  #genre-list > div { flex-shrink: 0; }
  .genre-btn { padding: 7px 12px; font-size: 12px; border-radius: 20px; white-space: nowrap; width: auto; }
  .genre-btn .genre-count { display: none; }
  .sub-list { display: none !important; }
  .sub-list.open { display: flex !important; flex-direction: row; overflow-x: auto; padding: 0 8px 8px; gap: 4px; max-height: none; }
  .sub-btn { padding: 5px 10px; font-size: 11px; border-radius: 16px; white-space: nowrap; width: auto; }
  .sub-count { display: none; }

  /* Main */
  #main { flex: 1; min-height: 0; display: flex; flex-direction: column; }
  #header { padding: 14px 16px 10px; flex-shrink: 0; }
  #genre-title { font-size: 20px; }
  #genre-desc { font-size: 11px; }

  /* Grid: scrollable, cards fixed size */
  #drink-grid {
    flex: 1;
    overflow-y: auto !important;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
    grid-template-columns: 1fr;
    gap: 10px;
    align-content: start;
  }

  /* Card: horizontal, fixed height */
  .drink-card {
    display: flex;
    flex-direction: row;
    align-items: stretch;
    border-radius: 12px;
    overflow: hidden;
    height: 110px;
    flex-shrink: 0;
  }
  .drink-img-wrap {
    width: 110px !important;
    height: 110px !important;
    aspect-ratio: unset !important;
    flex-shrink: 0;
    border-radius: 0;
    overflow: hidden;
  }
  .drink-img-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
  }
  .drink-emoji-wrap {
    width: 110px !important;
    height: 110px !important;
    aspect-ratio: unset !important;
    flex-shrink: 0;
    border-radius: 0;
    font-size: 36px;
  }
  .drink-info {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    flex: 1;
    overflow: hidden;
  }
  .drink-name { font-size: 13px; margin-bottom: 8px; line-height: 1.3; }
  .drink-price { font-size: 18px; }

  /* Modal */
  #modal-overlay { padding: 12px; }
  #modal-body { padding: 20px 20px 24px; }
  #modal-name { font-size: 20px; }
  #modal-price { font-size: 24px; }
}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div id="logo">
      <div class="brand">Social Parlor<br><span>omnivore</span></div>
      <div class="sub">Kachidoki, Tokyo</div>
    </div>
    <div id="genre-label">Drink Menu</div>
    <nav id="genre-list"></nav>
  </aside>
  <main id="main">
    <div id="header">
      <div id="genre-title"></div>
      <div id="genre-desc"></div>
    </div>
    <div id="drink-grid"></div>
  </main>
</div>
<div id="modal-overlay">
  <div id="modal">
    <div id="modal-img-wrap"></div>
    <div id="modal-body">
      <div id="modal-genre-tag"></div>
      <div id="modal-name"></div>
      <div id="modal-desc"></div>
      <div id="modal-price"></div>
    </div>
    <button id="modal-close" onclick="closeModal()">✕</button>
  </div>
</div>

// state
let currentGenreId = null;
let currentSubId = null;

function getGenre(id) { return MENU.find(g => g.id === id); }
function getAllItems(genre) {
  if (genre.subs) {
    return genre.subs.flatMap(s => s.items.map(i => ({...i, subName: s.nameEn})));
  }
  return genre.items || [];
}

function init() {
  renderGenreList();
  selectGenre(MENU[0].id);
}

function renderGenreList() {
  const nav = document.getElementById('genre-list');
  nav.innerHTML = MENU.map(g => {
    const totalItems = g.subs ? g.subs.reduce((a,s)=>a+s.items.length,0) : (g.items||[]).length;
    const isActive = g.id === currentGenreId;
    const hasSubs = !!g.subs;
    let subsHtml = '';
    if (hasSubs) {
      subsHtml = `<div class="sub-list ${isActive ? 'open' : ''}">` +
        g.subs.map(s => `
          <button class="sub-btn ${s.id === currentSubId ? 'active' : ''}"
                  onclick="selectSub('${g.id}','${s.id}',event)">
            ${s.name}
            <span class="sub-count">${s.items.length}</span>
          </button>
        `).join('') +
        `</div>`;
    }
    return `
      <div>
        <button class="genre-btn ${isActive ? 'active' : ''}" onclick="selectGenre('${g.id}')">
          <span class="genre-icon">${g.icon}</span>
          <span>${g.name}</span>
          <span class="genre-count">${totalItems}</span>
        </button>
        ${subsHtml}
      </div>
    `;
  }).join('');
}

function selectGenre(id) {
  currentGenreId = id;
  const genre = getGenre(id);
  currentSubId = genre.subs ? genre.subs[0].id : null;
  renderGenreList();
  renderContent();
}

function selectSub(genreId, subId, e) {
  e.stopPropagation();
  currentGenreId = genreId;
  currentSubId = subId;
  renderGenreList();
  renderContent();
}

function renderContent() {
  const genre = getGenre(currentGenreId);
  let items, titleEn, desc;

  if (genre.subs && currentSubId) {
    const sub = genre.subs.find(s => s.id === currentSubId);
    items = sub.items;
    titleEn = genre.nameEn + ' — ' + sub.nameEn;
    desc = genre.desc;
  } else {
    items = genre.items || [];
    titleEn = genre.nameEn;
    desc = genre.desc;
  }

  document.getElementById('genre-title').textContent = titleEn;
  document.getElementById('genre-desc').textContent = desc;

  const grid = document.getElementById('drink-grid');
  items = [...items].sort((a, b) => a.price - b.price);
  grid.innerHTML = items.map((item, i) => {
    const mediaHtml = item.img && IMAGES[item.img]
      ? `<div class="drink-img-wrap"><img src="${IMAGES[item.img]}" alt="${item.name}" loading="lazy"></div>`
      : `<div class="drink-emoji-wrap">${item.emoji || '🍶'}</div>`;
    return `
      <div class="drink-card" onclick="openModal(${i})" style="animation-delay:${i*0.05}s">
        ${mediaHtml}
        <div class="drink-info">
          <div class="drink-name">${item.name}</div>
          <div class="drink-price">¥${item.price.toLocaleString()}<span>（税込） / ${item.unit || "1杯"}</span></div>
        </div>
      </div>
    `;
  }).join('');

  // store current items for modal
  window._currentItems = items;
  window._currentGenreEn = genre.nameEn;
}

function openModal(i) {
  const item = window._currentItems[i];
  const wrap = document.getElementById('modal-img-wrap');
  if (item.img && IMAGES[item.img]) {
    wrap.innerHTML = `<img src="${IMAGES[item.img]}" alt="${item.name}">`;
  } else {
    wrap.innerHTML = `<span class="modal-emoji">${item.emoji || '🍶'}</span>`;
  }
  document.getElementById('modal-genre-tag').textContent = window._currentGenreEn;
  document.getElementById('modal-name').textContent = item.name;
  document.getElementById('modal-desc').textContent = item.desc;
  document.getElementById('modal-price').innerHTML = `¥${item.price.toLocaleString()}<span>（税込） / ${item.unit || "1杯"}</span>`;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

init();
</script>
