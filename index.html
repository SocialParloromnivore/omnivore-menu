<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Parlor omnivore - Menu</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: #1a1a1a;
            --text-primary: #f0f0f0;
            --text-secondary: #a0a0a0;
            --accent-color: #d4af37; /* Gold accent */
            --border-color: #333;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        .logo {
            font-size: 1.5rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            margin: 0;
        }

        .section-title {
            font-size: 1.2rem;
            border-left: 3px solid var(--accent-color);
            padding-left: 15px;
            margin: 40px 0 20px;
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        .menu-items {
            display: grid;
            gap: 20px;
        }

        .menu-item {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            transition: transform 0.2s;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: cover;
            flex-shrink: 0;
            background-color: #2a2a2a;
        }

        .item-details {
            padding: 15px;
            flex-grow: 1;
        }

        .item-name-container {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 5px;
        }

        .item-name {
            font-size: 1.1rem;
            margin: 0;
            color: var(--accent-color);
        }

        .item-price {
            font-weight: bold;
            font-size: 1rem;
        }

        .item-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin: 0;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        @media (max-width: 480px) {
            .item-image {
                width: 100px;
                height: 100px;
            }
            .item-name {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 class="logo">Social Parlor omnivore</h1>
        </header>

        <section id="whisky-jp" class="menu-section">
            <h2 class="section-title">Whisky (Japanese)</h2>
            <div class="menu-items">
                
                <div class="menu-item">
                    <img src="images/suntory-kaku.png" alt="サントリー角" class="item-image">
                    <div class="item-details">
                        <div class="item-name-container">
                            <h3 class="item-name">サントリー角</h3>
                            <span class="item-price">¥500</span>
                        </div>
                        <p class="item-description">
                            1937年誕生。山崎や白州蒸溜所のバーボン樽原酒をバランス良く配合した、甘やかな香りと厚みのあるコク。ハイボールがおすすめです。
                        </p>
                    </div>
                </div>

                </div>
        </section>

        <footer>
            <p>&copy; 2026 Social Parlor omnivore</p>
        </footer>
    </div>

</body>
</html>
